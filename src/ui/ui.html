<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--figma-color-bg, #ffffff);
    color: var(--figma-color-text, #111111);
    font: 11px/1.5 Inter, "Helvetica Neue", system-ui, sans-serif;
    overflow: hidden;
  }
  .view { display: flex; flex-direction: column; height: 100%; }
  [hidden] { display: none !important; }

  .input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    border-bottom: 1px solid var(--figma-color-border, #e6e6e6);
  }
  input[type="text"], input[type="password"], select {
    width: 100%;
    padding: 7px 8px;
    font: inherit;
    font-size: 12px;
    color: var(--figma-color-text, #111111);
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border: 1px solid transparent;
    border-radius: 5px;
    outline: none;
  }
  input:focus-visible, select:focus-visible {
    border-color: var(--figma-color-border-selected, #0d99ff);
  }
  button {
    font: inherit;
    color: var(--figma-color-text, #111111);
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border: 1px solid var(--figma-color-border, #e6e6e6);
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: var(--figma-color-bg-hover, #ececec); }
  button.primary {
    background: var(--figma-color-bg-brand, #0d99ff);
    color: var(--figma-color-text-onbrand, #ffffff);
    border-color: transparent;
  }
  button:focus-visible { outline: 2px solid var(--figma-color-border-selected, #0d99ff); }
  #settings-btn { width: 34px; height: 34px; font-size: 24px; padding: 6px 9px 8px; display: flex; align-items: center; justify-content: center; line-height: 1; color: var(--figma-color-text-secondary, #777777);}

  #results {
    flex: 1;
    overflow-y: auto;
    list-style: none;
    padding: 4px 0;
  }
  #results li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  #results li .label {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  #results li .label b {
    font-weight: 600;
    color: var(--figma-color-text-brand, #007be5);
  }
  #results li .meta {
    color: var(--figma-color-text-tertiary, #b3b3b3);
    font-size: 10px;
  }
  #results li.selected {
    background: var(--figma-color-bg-selected, #e5f4ff);
  }
  #results li .file-part { color: var(--figma-color-text-secondary, #777777); }
  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: var(--figma-color-text-secondary, #777777);
  }

  footer {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 12px;
    border-top: 1px solid var(--figma-color-border, #e6e6e6);
    color: var(--figma-color-text-secondary, #777777);
  }
  footer .stale { color: var(--figma-color-text-danger, #dc3412); }

  /* Settings */
  #settings-view { padding: 12px; gap: 10px; overflow-y: auto; }
  /* Without this, a height-constrained flex column shrinks its children
     into overlap instead of letting the view scroll. */
  #settings-view > * { flex-shrink: 0; }
  #settings-view h2 { font-size: 12px; font-weight: 600; }
  #settings-view label {
    display: flex;
    flex-direction: column;
    margin-bottom: 8px;
    gap: 4px;
    color: var(--figma-color-text-secondary, #777777);
  }
  #settings-view .row { display: flex; gap: 8px; margin-top: 2px; }
  #refresh-status { min-height: 16px; color: var(--figma-color-text-secondary, #777777); }
  #refresh-status.error { color: var(--figma-color-text-danger, #dc3412); }
  .hint { color: var(--figma-color-text-tertiary, #b3b3b3); }
  .projects-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--figma-color-text-secondary, #777777);
  }
  #projects-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid var(--figma-color-border, #e6e6e6);
    border-radius: 5px;
    padding: 6px 8px;
  }
  .project-row { display: flex; align-items: center; gap: 6px; }
  #settings-view .project-row label {
    flex: 1;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    color: var(--figma-color-text, #111111);
    cursor: pointer;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .project-row .reindex { padding: 1px 6px; font-size: 12px; }
</style>

<div id="search-view" class="view">
  <div class="input-row">
    <input id="query" type="text" placeholder="Jump to a page…" spellcheck="false" autocomplete="off" />
    <button id="settings-btn" title="Settings (Cmd/Ctrl+,)">&#9881;</button>
  </div>
  <ul id="results"></ul>
  <footer>
    <span id="index-status"></span>
    <span>&#8593;&#8595; navigate &nbsp; &#8629; jump &nbsp; esc close</span>
  </footer>
</div>

<div id="settings-view" class="view" hidden>
  <h2>Settings</h2>
  <label>
    Personal access token
    <input id="token" type="password" spellcheck="false" autocomplete="off"
      placeholder="figd_…" />
    <span class="hint">Create one at figma.com &#8594; account menu &#8594; Settings &#8594; Security &#8594;
      Personal access tokens. Scopes: File content (read-only) + Projects (read-only).
      The token is stored only on this device, in Figma's plugin storage.</span>
  </label>
  <label>
    Team IDs (comma-separated)
    <input id="team-ids" type="text" spellcheck="false" autocomplete="off"
      placeholder="e.g. 123456789012345678" />
    <span class="hint">Team ID is in the URL when viewing your team: figma.com/files/team/&lt;id&gt;/…</span>
  </label>
  <label>
    Open cross-file links via
    <select id="link-style">
      <option value="desktop">Desktop app (figma:// deep link)</option>
      <option value="web">Browser (www.figma.com)</option>
    </select>
  </label>
  <div class="projects-header">
    <span>Projects to index</span>
    <button id="load-projects-btn">Load projects</button>
  </div>
  <div id="projects-list"></div>
  <div class="row">
    <button id="save-btn" class="primary">Save</button>
    <button id="refresh-btn">Refresh index</button>
    <button id="back-btn">Back (esc)</button>
  </div>
  <div id="refresh-status"></div>
</div>

<script>/*__UI_SCRIPT__*/</script>
